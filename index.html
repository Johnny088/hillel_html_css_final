<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pizza Shop</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/modern-normalize@3.0.1/modern-normalize.min.css"
    />
    <link rel="stylesheet" href="./css/main.min.css" />
  </head>
  <body>
    <header class="header">
      <div class="container desktop">
        <a href="#" class="header_logo"
          ><svg width="132" height="36" class="header__icon">
            <use href="./icons/sprite.svg#logo"></use>
          </svg>
        </a>
        <nav class="header__nav">
          <ul class="header__nav">
            <li class="header__nav__list">
              <a href="#" class="header__nav__list__item"> Home </a>
            </li>
            <li class="header__nav__list">
              <a href="#" class="header__nav__list__item">Menu</a>
            </li>
            <li class="header__nav__list">
              <a href="#" class="header__nav__list__item">Events</a>
            </li>
            <li class="header__nav__list">
              <a href="" class="header__nav__list__item">About us</a>
            </li>
          </ul>
          <ul class="header__nav">
            <li class="navigation__item">
              <button>log in</button>
            </li>
            <li>
              <svg width="30" height="30" class="header__cart">
                <use href="./icons/sprite.svg#cart"></use>
              </svg>
            </li>
            <li>
              <svg width="30" height="30" class="header__burger">
                <use href="./icons/sprite.svg#burger"></use>
              </svg>
            </li>
          </ul>
        </nav>
      </div>
      <div class="mobile" data-menu>
        <ul class="mobile__menu">
          <li class="mobile__menu__item">
            <a href="#" class="mobile__menu__link">Home</a>
          </li>
          <li class="mobile__menu__item">
            <a href="#" class="mobile__menu__link">Menu</a>
          </li>

          <li class="mobile__menu__item">
            <a href="#" class="mobile__menu__link">Events</a>
          </li>

          <li class="mobile__menu__item">
            <a href="#" class="mobile__menu__link">About us</a>
          </li>
        </ul>
      </div>
    </header>
    <main>
      <section class="hero">
        <div class="container">
          <div>
            <img
              src="./sass/images/hero_pizza_mob.svg"
              alt="pizza"
              class="hero__pizza"
            />
            <img src="./sass/images/pizza_slice_mob.svg" alt="" />
            <img src="./sass/images/hero_fries_mob.svg" alt="" />
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
